<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexpo — World Trade Fairs</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root {
  --bg:#0a0d12; --surface:#111520; --surface2:#181e2e; --border:#1e2638;
  --accent:#3b82f6; --accent2:#06b6d4; --gold:#f59e0b;
  --text:#e2e8f0; --muted:#64748b; --success:#10b981;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}

/* HEADER */
header{position:sticky;top:0;z-index:200;background:rgba(10,13,18,.94);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 2rem;}
.header-inner{max-width:1500px;margin:0 auto;height:64px;display:flex;align-items:center;justify-content:space-between;gap:1rem;}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;color:var(--text);}
.logo-text span{color:var(--accent);}
.header-stats{display:flex;gap:2rem;font-size:.8rem;color:var(--muted);}
.header-stats strong{color:var(--text);}
.header-right{display:flex;gap:10px;align-items:center;}
.view-toggle{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:4px;}
.view-btn{background:transparent;border:none;color:var(--muted);padding:5px 12px;border-radius:5px;cursor:pointer;font-size:.82rem;transition:all .2s;display:flex;align-items:center;gap:5px;}
.view-btn.active{background:var(--accent);color:#fff;}
.header-cta{background:var(--accent);color:#fff;border:none;padding:8px 18px;border-radius:6px;font-family:'DM Sans',sans-serif;font-weight:500;font-size:.82rem;cursor:pointer;transition:all .2s;}
.header-cta:hover{background:#2563eb;}

/* HERO */
.hero{position:relative;z-index:1;padding:4rem 2rem 2.5rem;text-align:center;}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);color:var(--accent);padding:4px 14px;border-radius:100px;font-size:.75rem;font-weight:500;margin-bottom:1.2rem;letter-spacing:.5px;}
h1{font-family:'Syne',sans-serif;font-size:clamp(2.2rem,5vw,4rem);font-weight:800;line-height:1.1;margin-bottom:.8rem;background:linear-gradient(135deg,#e2e8f0 0%,#94a3b8 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
h1 em{font-style:normal;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hero-sub{color:var(--muted);font-size:1rem;max-width:520px;margin:0 auto 2rem;line-height:1.6;}
.search-wrap{max-width:680px;margin:0 auto 1rem;position:relative;}
.search-bar{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 18px 13px 50px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.95rem;outline:none;transition:all .2s;}
.search-bar::placeholder{color:var(--muted);}
.search-bar:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,.1);}
.search-icon{position:absolute;left:17px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:1rem;}
.result-info{text-align:center;font-size:.78rem;color:var(--muted);margin-bottom:1.5rem;}

/* FILTERS */
.filters{position:relative;z-index:1;max-width:1500px;margin:0 auto;padding:0 2rem 1.5rem;}
.filter-label{font-size:.7rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:.5rem;}
.chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:1rem;}
.chip{padding:5px 14px;border-radius:100px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:.78rem;cursor:pointer;transition:all .2s;}
.chip:hover{border-color:var(--accent);color:var(--text);}
.chip.active{background:rgba(59,130,246,.15);border-color:var(--accent);color:var(--accent);}
.filter-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.fsel{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:.78rem;cursor:pointer;outline:none;transition:border-color .2s;}
.fsel:focus{border-color:var(--accent);}
.fsel option{background:#111520;}

/* SECTION TOP */
.section-top{max-width:1500px;margin:0 auto;padding:0 2rem 1rem;display:flex;align-items:center;justify-content:space-between;}
.section-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;color:var(--text);}

/* LIST VIEW */
.list-wrap{position:relative;z-index:1;max-width:1500px;margin:0 auto;padding:0 2rem 4rem;}
.fairs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;}

/* MAP VIEW */
.map-wrap{position:relative;z-index:1;max-width:1500px;margin:0 auto;padding:0 2rem 4rem;}
.map-layout{display:grid;grid-template-columns:1fr 360px;gap:16px;height:620px;}
#map{border-radius:14px;border:1px solid var(--border);overflow:hidden;}
.map-sidebar{overflow-y:auto;display:flex;flex-direction:column;gap:8px;}
.map-sidebar::-webkit-scrollbar{width:3px;}
.map-sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.map-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;cursor:pointer;transition:all .2s;}
.map-card:hover,.map-card.highlighted{border-color:var(--accent);background:rgba(59,130,246,.06);}
.map-card-name{font-family:'Syne',sans-serif;font-weight:700;font-size:.88rem;margin-bottom:3px;}
.map-card-meta{font-size:.75rem;color:var(--muted);}
.map-card-date{font-size:.73rem;color:var(--accent2);margin-top:3px;}

/* FAIR CARD */
.fair-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:18px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;animation:fadeUp .35s both;}
.fair-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));opacity:0;transition:opacity .2s;}
.fair-card:hover{border-color:rgba(59,130,246,.3);transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.3);}
.fair-card:hover::before{opacity:1;}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px;}
.card-logo{width:44px;height:44px;border-radius:9px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;}
.card-badges{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end;}
.badge{padding:3px 9px;border-radius:100px;font-size:.68rem;font-weight:500;}
.b-sector{background:rgba(59,130,246,.12);color:#93c5fd;border:1px solid rgba(59,130,246,.2);}
.b-upcoming{background:rgba(16,185,129,.12);color:#6ee7b7;border:1px solid rgba(16,185,129,.2);}
.b-ongoing{background:rgba(245,158,11,.12);color:#fcd34d;border:1px solid rgba(245,158,11,.2);animation:pulse 2s infinite;}
.b-past{background:rgba(100,116,139,.12);color:#94a3b8;border:1px solid rgba(100,116,139,.2);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.card-name{font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;margin-bottom:3px;}
.card-edition{font-size:.72rem;color:var(--muted);margin-bottom:12px;}
.card-info{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.info-row{display:flex;align-items:center;gap:7px;font-size:.78rem;color:var(--muted);}
.info-icon{font-size:.8rem;width:15px;text-align:center;}
.info-row strong{color:var(--text);font-weight:500;}
.card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--border);}
.visitor-stat{display:flex;align-items:center;gap:5px;font-size:.74rem;color:var(--muted);}
.visitor-stat strong{color:var(--gold);font-family:'Syne',sans-serif;font-size:.85rem;}
.card-actions{display:flex;gap:6px;}
.btn-fav{background:transparent;border:1px solid var(--border);color:var(--muted);width:28px;height:28px;border-radius:5px;cursor:pointer;font-size:.8rem;transition:all .2s;display:flex;align-items:center;justify-content:center;}
.btn-fav:hover,.btn-fav.active{background:rgba(245,158,11,.1);border-color:var(--gold);color:var(--gold);}
.btn-detail{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);color:var(--accent);padding:4px 12px;border-radius:5px;cursor:pointer;font-size:.74rem;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .2s;}
.btn-detail:hover{background:rgba(59,130,246,.2);}
.countdown{font-size:.72rem;color:var(--muted);}
.cval{font-family:'Syne',sans-serif;font-weight:700;color:var(--accent2);font-size:.82rem;}
.empty{grid-column:1/-1;text-align:center;padding:5rem 2rem;color:var(--muted);}
.empty-icon{font-size:2.5rem;margin-bottom:.8rem;}
.empty h3{font-family:'Syne',sans-serif;color:var(--text);margin-bottom:.4rem;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(10px);z-index:1000;align-items:center;justify-content:center;padding:2rem;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;max-width:580px;width:100%;max-height:82vh;overflow-y:auto;padding:26px;position:relative;}
.modal::-webkit-scrollbar{width:3px;}
.modal::-webkit-scrollbar-thumb{background:var(--border);}
.modal-close{position:absolute;top:14px;right:14px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);width:30px;height:30px;border-radius:5px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.modal-close:hover{color:var(--text);}
.modal-tag{display:inline-flex;align-items:center;gap:5px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);color:var(--accent);padding:3px 11px;border-radius:100px;font-size:.72rem;margin-bottom:.9rem;}
.modal-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;margin-bottom:4px;}
.modal-subtitle{color:var(--muted);font-size:.83rem;margin-bottom:1.3rem;line-height:1.5;}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.3rem;}
.mstat{background:var(--surface2);border-radius:9px;padding:12px;border:1px solid var(--border);}
.mstat-label{font-size:.67rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.mstat-value{font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;color:var(--text);}
.modal-desc{color:var(--muted);font-size:.84rem;line-height:1.7;margin-bottom:1.2rem;}
.modal-website{display:inline-flex;align-items:center;gap:7px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.15);color:var(--accent);padding:9px 16px;border-radius:7px;text-decoration:none;font-size:.82rem;font-weight:500;transition:all .2s;}
.modal-website:hover{background:rgba(59,130,246,.15);}

/* LEAFLET CUSTOM */
.leaflet-container{background:#0d1117 !important;}
.expo-marker{background:var(--accent);border:2px solid rgba(255,255,255,.3);border-radius:50%;width:12px;height:12px;cursor:pointer;transition:all .2s;}
.expo-marker:hover{background:var(--accent2);transform:scale(1.4);}
.expo-popup .leaflet-popup-content-wrapper{background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.5);padding:0;}
.expo-popup .leaflet-popup-content{margin:0;padding:12px 14px;}
.expo-popup .leaflet-popup-tip-container{display:none;}
.popup-name{font-family:'Syne',sans-serif;font-weight:700;font-size:.85rem;color:var(--text);margin-bottom:3px;}
.popup-city{font-size:.75rem;color:var(--muted);}
.popup-date{font-size:.73rem;color:var(--accent2);margin-top:3px;}
.popup-btn{margin-top:7px;background:rgba(59,130,246,.15);border:none;color:var(--accent);padding:4px 10px;border-radius:5px;cursor:pointer;font-size:.72rem;width:100%;}

@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

@media(max-width:900px){.map-layout{grid-template-columns:1fr;height:auto;}.map-sidebar{max-height:260px;}.header-stats{display:none;}.fairs-grid{grid-template-columns:1fr;}.modal-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<header>
  <div class="header-inner">

      <span class="logo-text">Nex<span>po</span></span>

      <span><strong id="hCountries">0</strong> Countries</span>
      <span><strong>14</strong> Sectors</span>
    </div>
    <div class="header-right">
      <div class="view-toggle">
        <button class="view-btn active" id="btnList" onclick="setView('list')">☰ List</button>

      </div>
      <button class="header-cta">Upgrade to Pro ✦</button>
    </div>
  </div>
</header>

<section class="hero">
  <div class="hero-badge">🌍 nexpo.app — The Global Trade Fair Directory</div>
  <h1>Track Every <em>World Trade Fair</em><br>in One Place</h1>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-bar" id="searchInput" placeholder="Search by name, city, country or sector…" oninput="applyFilters()">
  </div>
  <div class="result-info" id="resultInfo"></div>
</section>

<div class="filters">
  <div class="filter-label">Sector</div>
  <div class="chips" id="sectorChips"></div>
  <div class="filter-row">
    <select class="fsel" id="countryFilter" onchange="applyFilters()"><option value="">🌍 All Countries</option></select>
    <select class="fsel" id="monthFilter" onchange="applyFilters()">
      <option value="">📅 All Months</option>
      <option value="1">January</option><option value="2">February</option><option value="3">March</option>
      <option value="4">April</option><option value="5">May</option><option value="6">June</option>
      <option value="7">July</option><option value="8">August</option><option value="9">September</option>
      <option value="10">October</option><option value="11">November</option><option value="12">December</option>
    </select>
    <select class="fsel" id="statusFilter" onchange="applyFilters()">
      <option value="">📌 All Status</option>
      <option value="upcoming">Upcoming</option>
      <option value="ongoing">Ongoing</option>
      <option value="past">Past</option>
    </select>
    <select class="fsel" id="regionFilter" onchange="applyFilters()">
      <option value="">🗺 All Regions</option>
      <option value="Europe">Europe</option>
      <option value="Asia">Asia</option>
      <option value="Americas">Americas</option>
      <option value="Middle East">Middle East</option>
      <option value="Africa">Africa</option>
      <option value="Oceania">Oceania</option>
    </select>
  </div>
</div>

<div class="section-top">
  <span class="section-title" id="sectionTitle">All Fairs</span>
  <select class="fsel" id="sortSelect" onchange="applyFilters()">
    <option value="date">Sort by Date</option>
    <option value="name">Sort by Name</option>
    <option value="visitors">Sort by Visitors</option>
  </select>
</div>

<!-- LIST VIEW -->
<div class="list-wrap" id="listView">
  <div class="fairs-grid" id="fairsGrid"></div>
</div>

<!-- MAP VIEW -->
<div class="map-wrap" id="mapView" style="display:none;">
  <div class="map-layout">
    <div id="map"></div>
    <div class="map-sidebar" id="mapSidebar"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal"><button class="modal-close" onclick="closeModalBtn()">✕</button><div id="modalBody"></div></div>
</div>

// ────────────────────────────────────────────────────────────────────────────
// STATE
// ─── API CONFIG ──────────────────────────────────────────────────────────────
// Replace with your Google Apps Script Web App URL after deployment:
const API_URL = "https://script.google.com/macros/s/AKfycbwSiHm_0GvXzBxpqfsbh5m9fmWGDbPrnOnPa-kMY410BoNOJaNpvKD34UWpyhkc9bGP/exec";
// If API_URL is not set, the app falls back to the FAIRS[] hardcoded data below.

let favorites = new Set();
let selectedSector = 'all';
let currentView = 'list';
let leafletMap = null;
let markers = [];
let currentFiltered = [];
let LIVE_FAIRS = null;   // populated from API; null = not loaded yet

// ────────────────────────────────────────────────────────────────────────────
// UTILS
function getStatus(s, e) {
  if (TODAY >= s && TODAY <= e) return 'ongoing';
  if (TODAY < s) return 'upcoming';
  return 'past';
}
function daysUntil(d) { return Math.ceil((d - TODAY) / 86400000); }
function fmtDate(d) {
  if (!(d instanceof Date) || isNaN(d)) return '—';
  return d.toLocaleDateString('en-GB', {day:'numeric', month:'short', year:'numeric'});
}
function fmtDateShort(d) {
  if (!(d instanceof Date) || isNaN(d)) return '—';
  return d.toLocaleDateString('en-GB', {day:'numeric', month:'short'});
}
function activeFairs() {
  // Use live API data if loaded, otherwise fall back to hardcoded FAIRS
  return LIVE_FAIRS || FAIRS;
}

// ────────────────────────────────────────────────────────────────────────────
// API LOADER
async function loadFromAPI() {
  if (!API_URL || API_URL === "YOUR_APPS_SCRIPT_URL_HERE") {
    // No API configured → use hardcoded data silently
    return false;
  }

  setLoadingState(true);
  try {
    const res  = await fetch(`${API_URL}?action=fairs&limit=2000`, { cache: "no-store" });
    const json = await res.json();

    if (!json.fairs || !Array.isArray(json.fairs)) throw new Error("Bad API response");

    // Normalise: convert string dates → Date objects
    // Sheets returns "Tue Dec 02 2025 00:00:00 GMT+0100" — handle both formats
    function parseSheetDate(s) {
      if (!s || s === 'undefined') return null;
      const iso = s.match(/(\d{4})-(\d{2})-(\d{2})/);
      if (iso) return new Date(iso[0]);
      const d = new Date(s);
      return isNaN(d) ? null : d;
    }
    LIVE_FAIRS = json.fairs
      .filter(f => f.name && f.name !== 'undefined' && f.startDate)
      .map((f, i) => ({
        ...f,
        id:          f.id || i + 1,
        name:        f.name || '',
        fullName:    f.fullName || f.name || '',
        sector:      f.sector || 'other',
        sectorLabel: f.sectorLabel || 'Other',
        city:        f.city || '',
        country:     f.country || '',
        venue:       f.venue || '',
        visitors:    f.visitors || '',
        exhibitors:  f.exhibitors || '',
        website:     f.event_url || f.website || '',
        description: f.description || '',
        freq:        f.freq || '',
        organizer_name: f.organizer_name || '',
        organizer_url:  f.organizer_url || '',
        event_url:      f.event_url || f.website || '',
        source_url:     f.source_url || '',
        last_seen_at:   f.lastUpdated || f.last_seen_at || '',
        hash_key:       f.hash_key || '',
        startDate:   parseSheetDate(f.startDate),
        endDate:     parseSheetDate(f.endDate || f.startDate),
        lat:         parseFloat(f.lat) || null,
        lng:         parseFloat(f.lng) || null,
      }))
      .filter(f => f.startDate && !isNaN(f.startDate));

    showDataBadge(`🔴 Live — ${LIVE_FAIRS.length} fairs from database`);
    return true;
  } catch (err) {
    console.warn("API load failed, using built-in data:", err.message);
    showDataBadge(`📦 Built-in data — ${FAIRS.length} fairs`);
    return false;
  } finally {
    setLoadingState(false);
  }
}

function setLoadingState(on) {
  const grid = document.getElementById('fairsGrid');
  if (on) {
    grid.innerHTML = `<div class="empty">
      <div class="empty-icon" style="animation:spin 1s linear infinite;display:inline-block">⏳</div>
      <h3>Loading live data…</h3>
      <p>Fetching from database</p>
    </div>`;
    document.getElementById('resultInfo').textContent = 'Loading…';
  }
}

function showDataBadge(text) {
  let badge = document.getElementById('dataBadge');
  if (!badge) {
    badge = document.createElement('div');
    badge.id = 'dataBadge';
    badge.style.cssText = `
      position:fixed; bottom:20px; right:20px; z-index:999;
      background:var(--surface); border:1px solid var(--border);
      padding:8px 14px; border-radius:8px; font-size:.75rem;
      color:var(--muted); backdrop-filter:blur(10px);
      transition: opacity 1s; cursor: default;
    `;
    document.body.appendChild(badge);
    // Keep badge visible
  }
  badge.textContent = text;
  badge.style.opacity = '1';
}

// ────────────────────────────────────────────────────────────────────────────
// INIT
async function init() {
  // Build UI scaffolding first (instant)
  const chipsEl = document.getElementById('sectorChips');
  chipsEl.innerHTML = SECTORS.map(s =>
    `<button class="chip ${s.id==='all'?'active':''}" onclick="selectSector('${s.id}',this)">${s.label}</button>`
  ).join('');

  // Show built-in data immediately while API loads
  buildCountryDropdown(FAIRS);
  updateHeaderCounts(FAIRS);
  applyFilters();

  // Then try to load from API in background
  const apiOk = await loadFromAPI();
  if (apiOk) {
    buildCountryDropdown(LIVE_FAIRS);
    updateHeaderCounts(LIVE_FAIRS);
    applyFilters();
  }
}

function buildCountryDropdown(fairs) {
  const csel = document.getElementById('countryFilter');
  const current = csel.value;
  csel.innerHTML = '<option value="">🌍 All Countries</option>';
  [...new Set(fairs.map(f=>f.country))].sort().forEach(c => {
    csel.innerHTML += `<option value="${c}" ${c===current?'selected':''}>${c}</option>`;
  });
}

function updateHeaderCounts(fairs) {
  document.getElementById('hCount').textContent = fairs.length.toLocaleString();
  document.getElementById('hCountries').textContent = new Set(fairs.filter(f=>f.country).map(f=>f.country)).size;
  const secEl = document.getElementById('hSectors');
  if (secEl) secEl.textContent = new Set(fairs.filter(f=>f.sector && f.sector!=='other').map(f=>f.sector)).size;
}

function selectSector(id, el) {
  selectedSector = id;
  document.querySelectorAll('.chips .chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

function setView(v) {
  currentView = v;
  document.getElementById('btnList').classList.toggle('active', v==='list');
  document.getElementById('btnMap').classList.toggle('active', v==='map');
  document.getElementById('listView').style.display = v==='list' ? '' : 'none';
  document.getElementById('mapView').style.display = v==='map' ? '' : 'none';
  if (v === 'map') { initMap(); renderMap(currentFiltered); }
}

// ────────────────────────────────────────────────────────────────────────────
// FILTERS
function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const country = document.getElementById('countryFilter').value;
  const month = document.getElementById('monthFilter').value;
  const status = document.getElementById('statusFilter').value;
  const region = document.getElementById('regionFilter').value;
  const sort = document.getElementById('sortSelect').value;

  let res = activeFairs().filter(f => {
    const st = getStatus(f.startDate, f.endDate);
    return (!q || [f.name,f.city,f.country,f.sectorLabel,f.fullName].some(x => x.toLowerCase().includes(q)))
      && (selectedSector === 'all' || f.sector === selectedSector)
      && (!country || f.country === country)
      && (!month || f.startDate instanceof Date && f.startDate.getMonth()+1 === +month)
      && (!status || st === status)
      && (!region || REGIONS[f.country] === region);
  });

  if (sort === 'date') res.sort((a,b) => a.startDate - b.startDate);
  else if (sort === 'name') res.sort((a,b) => a.name.localeCompare(b.name));
  else if (sort === 'visitors') res.sort((a,b) => parseInt(b.visitors.replace(/,/g,'')) - parseInt(a.visitors.replace(/,/g,'')));

  currentFiltered = res;
  const s = selectedSector !== 'all' ? SECTORS.find(x=>x.id===selectedSector)?.label : 'All Fairs';
  document.getElementById('sectionTitle').textContent = s;
  document.getElementById('resultInfo').textContent = `${res.length} fair${res.length!==1?'s':''} found`;

  if (currentView === 'list') renderCards(res);
  else renderMap(res);
}

// ────────────────────────────────────────────────────────────────────────────
// LIST VIEW
function renderCards(fairs) {
  const grid = document.getElementById('fairsGrid');
  if (!fairs.length) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><h3>No results found</h3><p>Try different filters</p></div>`;
    return;
  }
  grid.innerHTML = fairs.map((f,i) => {
    const st = getStatus(f.startDate, f.endDate);
    const days = daysUntil(f.startDate);
    const fav = favorites.has(f.id);
    const statusBadge = st==='ongoing'
      ? '<span class="badge b-ongoing">● Live</span>'
      : st==='upcoming'
        ? '<span class="badge b-upcoming">Upcoming</span>'
        : '<span class="badge b-past">Past</span>';
    const timeInfo = st==='upcoming' && days<=400
      ? `<div class="info-row"><span class="info-icon">⏱</span><span class="countdown"><span class="cval">${days}</span> days left</span></div>`
      : st==='ongoing' ? `<div class="info-row"><span class="info-icon">🟢</span><span style="color:#6ee7b7;font-size:.78rem">Open now</span></div>` : '';
    const icon = f.icon || SECTOR_ICONS[f.sector] || '🌐';
    const edition = f.edition || '';
    const freq = f.freq || '';
    const editionLine = (edition || freq) ? `${edition}${edition&&freq?' · ':''}${freq}` : f.country;
    const venueLine = [f.venue, f.city, f.country].filter(Boolean).join(', ');
    const visitorsLine = f.visitors ? `~${f.visitors} visitors · ${f.exhibitors} exhibitors` : `${f.city}, ${f.country}`;
    return `<div class="fair-card" style="animation-delay:${i*30}ms" onclick="openModal(${f.id})">
      <div class="card-header">
        <div class="card-logo">${icon}</div>
        <div class="card-badges"><span class="badge b-sector">${f.sectorLabel}</span>${statusBadge}</div>
      </div>
      <div class="card-name">${f.name}</div>
      <div class="card-edition">${editionLine}</div>
      <div class="card-info">
        <div class="info-row"><span class="info-icon">📅</span><strong>${fmtDate(f.startDate)}</strong> — ${fmtDate(f.endDate)}</div>
        <div class="info-row"><span class="info-icon">📍</span>${venueLine}</div>
        <div class="info-row"><span class="info-icon">👥</span>${visitorsLine}</div>
        ${timeInfo}
      </div>
      <div class="card-footer">
        <div class="visitor-stat">🏆 <strong>${f.visitors || f.country}</strong></div>
        <div class="card-actions">
          <button class="btn-fav ${fav?'active':''}" onclick="toggleFav(event,${f.id})">⭐</button>
          <button class="btn-detail" onclick="openModal(${f.id});event.stopPropagation()">Details →</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ────────────────────────────────────────────────────────────────────────────
// MAP VIEW
function initMap() {
  if (leafletMap) return;
  leafletMap = L.map('map', {zoomControl:true, attributionControl:false}).setView([30, 15], 2);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 18, subdomains: 'abcd'
  }).addTo(leafletMap);
}

function renderMap(fairs) {
  if (!leafletMap) return;
  markers.forEach(m => leafletMap.removeLayer(m));
  markers = [];

  const sidebar = document.getElementById('mapSidebar');
  sidebar.innerHTML = '';

  const sectorColors = {
    packaging:'#3b82f6', textile:'#8b5cf6', electronics:'#06b6d4',
    food:'#f59e0b', construction:'#ef4444', automotive:'#10b981',
    health:'#ec4899', agriculture:'#84cc16', furniture:'#f97316',
    energy:'#fbbf24', chemicals:'#a78bfa', defence:'#6b7280', other:'#94a3b8'
  };

  fairs.forEach((f, i) => {
    if (!f.lat || !f.lng || isNaN(f.lat) || isNaN(f.lng)) return;
    const st = getStatus(f.startDate, f.endDate);
    const col = sectorColors[f.sector] || '#3b82f6';

    const icon = L.divIcon({
      html: `<div style="width:10px;height:10px;background:${col};border:2px solid rgba(255,255,255,.5);border-radius:50%;cursor:pointer;box-shadow:0 0 6px ${col}88;transition:all .2s;"></div>`,
      className: '', iconSize: [10, 10], iconAnchor: [5, 5]
    });

    const marker = L.marker([f.lat, f.lng], {icon})
      .addTo(leafletMap)
      .bindPopup(`
        <div style="font-family:'DM Sans',sans-serif;min-width:180px;">
          <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:.85rem;color:#e2e8f0;margin-bottom:3px;">${f.icon} ${f.name}</div>
          <div style="font-size:.73rem;color:#64748b;">${f.city}, ${f.country}</div>
          <div style="font-size:.73rem;color:#06b6d4;margin-top:3px;">${fmtDateShort(f.startDate)} — ${fmtDateShort(f.endDate)} ${f.startDate.getFullYear()}</div>
          <div style="font-size:.7rem;color:#3b82f6;margin-top:2px;">${f.sectorLabel}</div>
          <button onclick="openModal(${f.id})" style="margin-top:8px;width:100%;background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.2);color:#93c5fd;padding:4px;border-radius:5px;cursor:pointer;font-size:.72rem;font-family:'DM Sans',sans-serif;">View Details →</button>
        </div>
      `, {className: 'expo-popup', maxWidth: 220})
      .on('click', () => highlightSidebarCard(f.id));

    markers.push(marker);

    // Sidebar card
    const card = document.createElement('div');
    card.className = 'map-card';
    card.id = `mc-${f.id}`;
    card.onclick = () => {
      leafletMap.setView([f.lat, f.lng], 6, {animate:true});
      marker.openPopup();
      highlightSidebarCard(f.id);
    };
    const st2 = st==='ongoing' ? '🟢 ' : st==='upcoming' ? '🔵 ' : '⚫ ';
    card.innerHTML = `
      <div class="map-card-name">${SECTOR_ICONS[f.sector]||'🌐'} ${f.name}</div>
      <div class="map-card-meta">${f.city}, ${f.country} · ${f.sectorLabel}</div>
      <div class="map-card-date">${st2}${fmtDateShort(f.startDate)} — ${fmtDateShort(f.endDate)} ${f.startDate.getFullYear()}</div>
    `;
    sidebar.appendChild(card);
  });
}

function highlightSidebarCard(id) {
  document.querySelectorAll('.map-card').forEach(c => c.classList.remove('highlighted'));
  const el = document.getElementById(`mc-${id}`);
  if (el) { el.classList.add('highlighted'); el.scrollIntoView({behavior:'smooth', block:'nearest'}); }
}

// ────────────────────────────────────────────────────────────────────────────
// MODAL
function openModal(id) {
  const f = activeFairs().find(x => String(x.id) === String(id));
  if (!f) return;
  const st = getStatus(f.startDate, f.endDate);
  const days = daysUntil(f.startDate);
  const stText = st==='ongoing' ? '🟢 Ongoing' : st==='upcoming' ? `🔵 In ${days} days` : '⚫ Concluded';
  document.getElementById('modalBody').innerHTML = `
    <div class="modal-tag">${SECTOR_ICONS[f.sector]||'🌐'} ${f.sectorLabel}</div>
    <div class="modal-title">${f.name}</div>
    <div class="modal-subtitle">${f.fullName}</div>
    <div class="modal-grid">
      <div class="mstat"><div class="mstat-label">Dates</div><div class="mstat-value" style="font-size:.82rem">${fmtDate(f.startDate)} — ${fmtDate(f.endDate)}</div></div>
      <div class="mstat"><div class="mstat-label">Status</div><div class="mstat-value" style="font-size:.82rem">${stText}</div></div>
      <div class="mstat"><div class="mstat-label">Venue</div><div class="mstat-value" style="font-size:.8rem">${f.venue||'—'}</div></div>
      <div class="mstat"><div class="mstat-label">Location</div><div class="mstat-value" style="font-size:.82rem">${[f.city,f.country].filter(Boolean).join(', ')||'—'}</div></div>
      <div class="mstat"><div class="mstat-label">Visitors</div><div class="mstat-value">${f.visitors||'—'}</div></div>
      <div class="mstat"><div class="mstat-label">Exhibitors</div><div class="mstat-value">${f.exhibitors||'—'}</div></div>
      <div class="mstat"><div class="mstat-label">Frequency</div><div class="mstat-value" style="font-size:.82rem">${f.freq||'—'}</div></div>
      <div class="mstat"><div class="mstat-label">Region</div><div class="mstat-value" style="font-size:.82rem">${REGIONS[f.country]||'—'}</div></div>
      <div class="mstat"><div class="mstat-label">Organizer</div><div class="mstat-value" style="font-size:.82rem">${f.organizer_name ? (f.organizer_url ? `<a href="${f.organizer_url}" target="_blank" style="color:var(--accent)">${f.organizer_name}</a>` : f.organizer_name) : '—'}</div></div>
    </div>
    <p class="modal-desc">${f.description||''}</p>
    ${(f.event_url||f.website) ? `<a href="${f.event_url||f.website}" target="_blank" class="modal-website">🌐 Official Website →</a>` : ''}
  `;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(e) { if (e.target === document.getElementById('modalOverlay')) closeModalBtn(); }
function closeModalBtn() { document.getElementById('modalOverlay').classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key==='Escape') closeModalBtn(); });

function toggleFav(e, id) {
  e.stopPropagation();
  favorites.has(id) ? favorites.delete(id) : favorites.add(id);
  applyFilters();
}

init();
</script>
